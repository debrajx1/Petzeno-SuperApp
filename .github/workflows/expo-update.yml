name: Publish EAS Update

on:
  push:
    branches:
      - main
    paths:
      - 'petzeno-expo/**' # Only trigger if mobile app code changes

jobs:
  update:
    name: Publish Expo EAS Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./petzeno-expo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm
          cache-dependency-path: petzeno-expo/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish Update
        run: eas update --branch production --message "Automated update from GitHub ($GITHUB_SHA)"
